# MediaMTX – low-latency configuration
# Reduces HLS end-to-end lag from ~6 s (default) to ~1-2 s.

# ── HLS ────────────────────────────────────────────────────────────────────────
# Each segment is 0.5 s (default: 2 s). Browsers can start playback sooner.
hlsSegmentDuration: 0.5s

# Keep 7 segments in the playlist — minimum required for stable HLS delivery.
# 7 × 0.5 s = 3.5 s of buffer; latency stays around 1–1.5 s at the live edge.
hlsSegmentCount: 7

# Allow browsers to fetch HLS manifests and segments cross-origin.
hlsAllowOrigin: '*'

# Bind addresses (keep defaults – mapped via docker-compose ports).
rtspAddress: :8554
hlsAddress: :8888
webrtcAddress: :8889

# Force TCP transport (matches MTX_PROTOCOLS=tcp env var in docker-compose).
rtspTransports: [tcp]

paths:
  all:
