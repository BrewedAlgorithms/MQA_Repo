services:
  workers:
    image: node:22-alpine
    container_name: mqa_workers
    working_dir: /app
    volumes:
      - ./frontend/workers:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"

  admin:
    image: node:22-alpine
    container_name: mqa_admin
    working_dir: /app
    volumes:
      - ./frontend/admin:/app
      - /app/node_modules
    ports:
      - "5174:5173"
    command: sh -c "npm install && npm run dev -- --host"
