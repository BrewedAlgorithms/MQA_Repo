services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mqa_mediamtx
    restart: unless-stopped
    environment:
      - MTX_PROTOCOLS=tcp
    ports:
      - "8554:8554"   # RTSP
      - "8888:8888"   # HLS
      - "8889:8889"   # WebRTC

  workers:
    image: node:22-alpine
    container_name: mqa_workers
    working_dir: /app
    volumes:
      - ./frontend/workers:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"

  admin:
    image: node:22-alpine
    container_name: mqa_admin
    working_dir: /app
    volumes:
      - ./frontend/admin/react-app:/app
      - /app/node_modules
    ports:
      - "5174:5173"
    command: sh -c "npm install && npm run dev -- --host"
