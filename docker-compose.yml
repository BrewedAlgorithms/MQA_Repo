services:
  mongo:
    image: mongo:7
    container_name: mqa_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mqa_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - MONGO_URI=mongodb://mongo:27017
      - MONGO_DB=mqa_db
    ports:
      - "8001:8001"
    depends_on:
      - mongo
    volumes:
      - ./backend:/app

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mqa_mediamtx
    restart: unless-stopped
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
    ports:
      - "8554:8554"   # RTSP
      - "8888:8888"   # HLS
      - "8889:8889"   # WebRTC

  workers:
    image: node:22-alpine
    container_name: mqa_workers
    working_dir: /app
    volumes:
      - ./frontend/workers:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"

  admin:
    image: node:22-alpine
    container_name: mqa_admin
    working_dir: /app
    volumes:
      - ./frontend/admin/react-app:/app
      - /app/node_modules
    ports:
      - "5174:5173"
    command: sh -c "npm install && npm run dev -- --host"

volumes:
  mongo_data:
